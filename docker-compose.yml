services:
  db:
    image: postgres:16-alpine
    container_name: aiha-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiha123}
      POSTGRES_DB: ${POSTGRES_DB:-aiha_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiha}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    networks:
      - aiha-net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aiha-backend
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aiha-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aiha-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - aiha-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  aiha-net:
    driver: bridge
